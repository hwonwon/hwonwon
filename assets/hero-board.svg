<svg width="880" height="360" viewBox="0 0 880 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="장호원 — Security &amp; Infrastructure Engineer — production status board">
  <style>
    text { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 13px; }
    .g   { fill: #3FB950; }
    .c   { fill: #E6EDF3; }
    .o   { fill: #8B949E; }
    .f   { fill: #575E68; }
    .num { fill: #E3B341; }
    .dim { fill: #575E68; font-size: 12px; }
    .lbl { fill: #575E68; font-size: 11px; letter-spacing: .14em; }
    .kv  { fill: #8B949E; font-size: 12.5px; }
    .name { fill: #E6EDF3; font-size: 28px; font-weight: 700; }
    .sub  { fill: #3FB950; font-size: 14px; font-weight: 600; }
    .ln { opacity: 0; animation: in .4s ease-out forwards; }
    .r1 { animation-delay: .3s }  .r2 { animation-delay: .5s }
    .r3 { animation-delay: .7s }  .r4 { animation-delay: .9s }
    .r5 { animation-delay: 1.1s } .r6 { animation-delay: 1.3s }
    .r7 { animation-delay: 1.5s } .r8 { animation-delay: 1.7s }
    .d1 { animation-delay: .2s }  .d2 { animation-delay: .55s }
    .d3 { animation-delay: .9s }  .d4 { animation-delay: 1.25s }
    .d5 { animation-delay: 1.6s } .d6 { animation-delay: 2.2s }
    @keyframes in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .dot { animation: pulse 2.4s ease-in-out infinite; }
    .p2 { animation-delay: .3s } .p3 { animation-delay: .6s }
    .p4 { animation-delay: .9s } .p5 { animation-delay: 1.2s }
    .p6 { animation-delay: 1.5s } .p7 { animation-delay: 1.8s } .p8 { animation-delay: 2.1s }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    .scan { animation: sweep 3.6s linear infinite; }
    @keyframes sweep { from { transform: translateY(0); opacity: 0; } 8% { opacity: .5; } 92% { opacity: .5; } to { transform: translateY(216px); opacity: 0; } }
  </style>

  <defs>
    <clipPath id="win"><rect x="1" y="1" width="878" height="358" rx="10"/></clipPath>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="878" height="358" rx="10" fill="#0C1117"/>
  <g clip-path="url(#win)">
    <rect x="1" y="1" width="878" height="40" fill="#161B22"/>
    <line x1="1" y1="41" x2="879" y2="41" stroke="#21262D" stroke-width="1"/>
    <line x1="540" y1="41" x2="540" y2="359" stroke="#1B222C" stroke-width="1"/>
  </g>
  <rect x="1" y="1" width="878" height="358" rx="10" stroke="#30363D" stroke-width="1.5"/>

  <!-- traffic lights + title -->
  <circle cx="26" cy="21" r="5.5" fill="#FF5F57"/>
  <circle cx="46" cy="21" r="5.5" fill="#FEBC2E"/>
  <circle cx="66" cy="21" r="5.5" fill="#28C840"/>
  <text x="440" y="26" text-anchor="middle" class="dim">howon@sec-ops — watch status --production</text>

  <!-- ===== left: service board ===== -->
  <g class="ln d1">
    <text x="36" y="74" class="lbl">PRODUCTION SERVICES</text>
    <text x="504" y="74" text-anchor="end"><tspan class="num">8/8</tspan><tspan class="g" dx="8">ACTIVE</tspan></text>
    <line x1="36" y1="86" x2="504" y2="86" stroke="#1E2530" stroke-width="1"/>
  </g>

  <!-- scanning line -->
  <g clip-path="url(#win)">
    <rect x="36" y="94" width="468" height="20" fill="#3FB950" opacity="0" class="scan" style="mix-blend-mode:screen; fill-opacity:.07"/>
  </g>

  <g class="ln r1">
    <circle cx="42" cy="105" r="4" fill="#3FB950" class="dot"/>
    <text x="58" y="110" class="c">erp-anomaly-detect</text>
    <text x="330" y="110" class="g">active</text>
    <text x="504" y="110" text-anchor="end" class="f">security</text>
  </g>
  <g class="ln r2">
    <circle cx="42" cy="132" r="4" fill="#3FB950" class="dot p2"/>
    <text x="58" y="137" class="c">file-exfil-audit</text>
    <text x="330" y="137" class="g">active</text>
    <text x="504" y="137" text-anchor="end" class="f">security</text>
  </g>
  <g class="ln r3">
    <circle cx="42" cy="159" r="4" fill="#3FB950" class="dot p3"/>
    <text x="58" y="164" class="c">pii-access-audit</text>
    <text x="330" y="164" class="g">active</text>
    <text x="504" y="164" text-anchor="end" class="f">audit</text>
  </g>
  <g class="ln r4">
    <circle cx="42" cy="186" r="4" fill="#3FB950" class="dot p4"/>
    <text x="58" y="191" class="c">hr-mutual-eval</text>
    <text x="330" y="191" class="g">active</text>
    <text x="504" y="191" text-anchor="end" class="f">hr</text>
  </g>
  <g class="ln r5">
    <circle cx="42" cy="213" r="4" fill="#3FB950" class="dot p5"/>
    <text x="58" y="218" class="c">brand-portal</text>
    <text x="330" y="218" class="g">active</text>
    <text x="504" y="218" text-anchor="end" class="f">b2b</text>
  </g>
  <g class="ln r6">
    <circle cx="42" cy="240" r="4" fill="#3FB950" class="dot p6"/>
    <text x="58" y="245" class="c">network-dashboard</text>
    <text x="330" y="245" class="g">active</text>
    <text x="504" y="245" text-anchor="end" class="f">network</text>
  </g>
  <g class="ln r7">
    <circle cx="42" cy="267" r="4" fill="#3FB950" class="dot p7"/>
    <text x="58" y="272" class="c">helpdesk-ai</text>
    <text x="330" y="272" class="g">active</text>
    <text x="504" y="272" text-anchor="end" class="f">automation</text>
  </g>
  <g class="ln r8">
    <circle cx="42" cy="294" r="4" fill="#3FB950" class="dot p8"/>
    <text x="58" y="299" class="c">sw-portal</text>
    <text x="330" y="299" class="g">active</text>
    <text x="504" y="299" text-anchor="end" class="f">platform</text>
  </g>

  <g class="ln d6">
    <line x1="36" y1="316" x2="504" y2="316" stroke="#1E2530" stroke-width="1"/>
    <text x="36" y="338" class="dim">every 1.0s — all systems operational</text>
  </g>

  <!-- ===== right: identity panel ===== -->
  <g class="ln d2">
    <text x="576" y="106" class="name">장호원</text>
    <text x="576" y="131" class="dim">Howon Jang</text>
  </g>
  <g class="ln d3">
    <text x="576" y="166" class="sub">Security &amp; Infrastructure Engineer</text>
  </g>
  <g class="ln d4">
    <line x1="576" y1="190" x2="844" y2="190" stroke="#1E2530" stroke-width="1"/>
  </g>
  <g class="ln d5">
    <text x="576" y="220" class="f">cluster</text>
    <text x="648" y="220" class="kv" textLength="135" lengthAdjust="spacingAndGlyphs">on-prem Kubernetes</text>
    <text x="576" y="247" class="f">coverage</text>
    <text x="648" y="247" class="kv" textLength="190" lengthAdjust="spacingAndGlyphs">security · infra · network</text>
    <text x="576" y="274" class="f">mode</text>
    <text x="648" y="274" class="kv" textLength="178" lengthAdjust="spacingAndGlyphs">design → build → operate</text>
  </g>
  <g class="ln d6">
    <line x1="576" y1="298" x2="844" y2="298" stroke="#1E2530" stroke-width="1"/>
    <text x="576" y="330"><tspan class="g">●</tspan><tspan class="o" dx="8">open to interesting problems</tspan></text>
  </g>
</svg>
