<svg width="880" height="330" viewBox="0 0 880 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="장호원 — Security &amp; Infrastructure Engineer — production status board">
  <style>
    text { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 13px; }
    .g   { fill: #3FB950; }
    .c   { fill: #E6EDF3; }
    .o   { fill: #8B949E; }
    .f   { fill: #575E68; }
    .num { fill: #E3B341; }
    .dim { fill: #575E68; font-size: 12px; }
    .lbl { fill: #575E68; font-size: 11px; letter-spacing: .14em; }
    .name { fill: #E6EDF3; font-size: 28px; font-weight: 700; }
    .sub  { fill: #3FB950; font-size: 14px; font-weight: 600; }
    .ln { opacity: 0; animation: in .4s ease-out forwards; }
    .d1 { animation-delay: .3s }  .d2 { animation-delay: .55s }
    .d3 { animation-delay: .8s }  .d4 { animation-delay: 1.05s }
    .d5 { animation-delay: 1.3s } .d6 { animation-delay: 1.55s }
    .d7 { animation-delay: 2.1s } .d8 { animation-delay: .2s }
    @keyframes in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .dot { animation: pulse 2.4s ease-in-out infinite; }
    .p2 { animation-delay: .4s } .p3 { animation-delay: .8s }
    .p4 { animation-delay: 1.2s } .p5 { animation-delay: 1.6s } .p6 { animation-delay: 2s }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    .scan { animation: sweep 3.2s linear infinite; }
    @keyframes sweep { from { transform: translateY(0); opacity: 0; } 8% { opacity: .5; } 92% { opacity: .5; } to { transform: translateY(196px); opacity: 0; } }
  </style>

  <defs>
    <clipPath id="win"><rect x="1" y="1" width="878" height="328" rx="10"/></clipPath>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="878" height="328" rx="10" fill="#0C1117"/>
  <g clip-path="url(#win)">
    <rect x="1" y="1" width="878" height="40" fill="#161B22"/>
    <line x1="1" y1="41" x2="879" y2="41" stroke="#21262D" stroke-width="1"/>
    <line x1="540" y1="41" x2="540" y2="329" stroke="#1B222C" stroke-width="1"/>
  </g>
  <rect x="1" y="1" width="878" height="328" rx="10" stroke="#30363D" stroke-width="1.5"/>

  <!-- traffic lights + title -->
  <circle cx="26" cy="21" r="5.5" fill="#FF5F57"/>
  <circle cx="46" cy="21" r="5.5" fill="#FEBC2E"/>
  <circle cx="66" cy="21" r="5.5" fill="#28C840"/>
  <text x="440" y="26" text-anchor="middle" class="dim">howon@sec-ops — watch status --production</text>

  <!-- ===== left: service board ===== -->
  <g class="ln d8">
    <text x="36" y="74" class="lbl">PRODUCTION SERVICES</text>
    <text x="504" y="74" text-anchor="end"><tspan class="num">6/6</tspan><tspan class="g" dx="8">ACTIVE</tspan></text>
    <line x1="36" y1="86" x2="504" y2="86" stroke="#1E2530" stroke-width="1"/>
  </g>

  <!-- scanning line -->
  <g clip-path="url(#win)">
    <rect x="36" y="96" width="468" height="22" fill="#3FB950" opacity="0" class="scan" style="mix-blend-mode:screen; fill-opacity:.07"/>
  </g>

  <g class="ln d1">
    <circle cx="42" cy="108" r="4" fill="#3FB950" class="dot"/>
    <text x="58" y="113" class="c">erp-anomaly-detect</text>
    <text x="330" y="113" class="g">active</text>
    <text x="504" y="113" text-anchor="end" class="f">security</text>
  </g>
  <g class="ln d2">
    <circle cx="42" cy="141" r="4" fill="#3FB950" class="dot p2"/>
    <text x="58" y="146" class="c">file-exfil-audit</text>
    <text x="330" y="146" class="g">active</text>
    <text x="504" y="146" text-anchor="end" class="f">security</text>
  </g>
  <g class="ln d3">
    <circle cx="42" cy="174" r="4" fill="#3FB950" class="dot p3"/>
    <text x="58" y="179" class="c">pii-access-audit</text>
    <text x="330" y="179" class="g">active</text>
    <text x="504" y="179" text-anchor="end" class="f">audit</text>
  </g>
  <g class="ln d4">
    <circle cx="42" cy="207" r="4" fill="#3FB950" class="dot p4"/>
    <text x="58" y="212" class="c">network-dashboard</text>
    <text x="330" y="212" class="g">active</text>
    <text x="504" y="212" text-anchor="end" class="f">network</text>
  </g>
  <g class="ln d5">
    <circle cx="42" cy="240" r="4" fill="#3FB950" class="dot p5"/>
    <text x="58" y="245" class="c">helpdesk-ai</text>
    <text x="330" y="245" class="g">active</text>
    <text x="504" y="245" text-anchor="end" class="f">automation</text>
  </g>
  <g class="ln d6">
    <circle cx="42" cy="273" r="4" fill="#3FB950" class="dot p6"/>
    <text x="58" y="278" class="c">sw-portal</text>
    <text x="330" y="278" class="g">active</text>
    <text x="504" y="278" text-anchor="end" class="f">platform</text>
  </g>

  <g class="ln d7">
    <line x1="36" y1="296" x2="504" y2="296" stroke="#1E2530" stroke-width="1"/>
    <text x="36" y="316" class="dim">every 1.0s — all systems operational</text>
  </g>

  <!-- ===== right: identity panel ===== -->
  <g class="ln d2">
    <text x="576" y="99" class="name">장호원</text>
    <text x="576" y="124" class="dim">Howon Jang</text>
  </g>
  <g class="ln d3">
    <text x="576" y="158" class="sub">Security &amp; Infrastructure Engineer</text>
  </g>
  <g class="ln d4">
    <line x1="576" y1="180" x2="844" y2="180" stroke="#1E2530" stroke-width="1"/>
  </g>
  <g class="ln d5">
    <text x="576" y="208" class="f">cluster</text>
    <text x="676" y="208" class="o">on-prem Kubernetes</text>
    <text x="576" y="234" class="f">coverage</text>
    <text x="676" y="234" class="o">security · infra · network</text>
    <text x="576" y="260" class="f">mode</text>
    <text x="676" y="260" class="o">design → build → operate</text>
  </g>
  <g class="ln d7">
    <line x1="576" y1="282" x2="844" y2="282" stroke="#1E2530" stroke-width="1"/>
    <text x="576" y="310"><tspan class="g">●</tspan><tspan class="o" dx="8">open to interesting problems</tspan></text>
  </g>
</svg>
